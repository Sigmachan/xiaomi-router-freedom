# mihomo — Xiaomi BE10000 (cherry-pick: sing-box -> mihomo TUN)
# DNS: loopback only, НЕ перехватывает LAN (dnsmasq->AGH->unbound целы)
mixed-port: 7890
redir-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 0.0.0.0:9010
secret: ""
external-ui: ui
external-ui-name: metacubexd
geodata-mode: true
geo-auto-update: false

tun:
  enable: true
  stack: mixed
  auto-detect-interface: true
  include-interface:
    - br-lan

sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniffing:
    - tls
    - http
    - quic

dns:
  enable: true
  listen: 127.0.0.1:1053
  ipv6: false
  enhanced-mode: redir-host
  nameserver:
    - 127.0.0.1:5353
  proxy-server-nameserver:
    - 127.0.0.1:5353

proxies:
  - name: upstream
    type: vless
    server: YOUR_SERVER_HOST
    port: 443
    uuid: YOUR_UUID
    network: tcp
    tls: true
    udp: true
    packet-encoding: xudp
    flow: xtls-rprx-vision
    servername: YOUR_SNI
    client-fingerprint: firefox
    reality-opts:
      public-key: YOUR_REALITY_PUBLIC_KEY
      short-id: "YOUR_SHORT_ID"

proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - upstream
      - DIRECT

rule-providers:
  refilter_domains:
    type: file
    behavior: domain
    path: ./ruleset/refilter_domains.txt
    format: text
  refilter_ips:
    type: file
    behavior: ipcidr
    path: ./ruleset/refilter_ips.txt
    format: text

rules:
  # --- Torrent-трекеры -> туннель (выше RU-direct) ---
  - DOMAIN-SUFFIX,rutracker.org,Proxy
  - DOMAIN-SUFFIX,rutracker.net,Proxy
  - DOMAIN-SUFFIX,rutracker.cc,Proxy
  - DOMAIN-SUFFIX,rutracker.ru,Proxy
  - DOMAIN-SUFFIX,rutrk.org,Proxy
  - DOMAIN-SUFFIX,nnmclub.to,Proxy
  - DOMAIN-SUFFIX,nnm-club.ws,Proxy
  - DOMAIN-SUFFIX,nnm-club.name,Proxy
  - DOMAIN-SUFFIX,nnmclub.ru,Proxy
  - DOMAIN-SUFFIX,kinozal.tv,Proxy
  - DOMAIN-SUFFIX,kinozal.guru,Proxy
  - DOMAIN-SUFFIX,kinozal.me,Proxy
  - DOMAIN-SUFFIX,rutor.info,Proxy
  - DOMAIN-SUFFIX,rutor.org,Proxy
  - DOMAIN-SUFFIX,rutor.is,Proxy
  - DOMAIN-SUFFIX,1337x.to,Proxy
  - DOMAIN-SUFFIX,thepiratebay.org,Proxy
  - DOMAIN-SUFFIX,nyaa.si,Proxy
  # --- РФ напрямую (маркетплейсы / yandex / vk / .ru .su .рф) ---
  - DOMAIN-SUFFIX,ru,DIRECT
  - DOMAIN-SUFFIX,su,DIRECT
  - DOMAIN-SUFFIX,xn--p1ai,DIRECT
  - DOMAIN-SUFFIX,vk.com,DIRECT
  - DOMAIN-SUFFIX,vk.ru,DIRECT
  - DOMAIN-SUFFIX,vkontakte.ru,DIRECT
  - DOMAIN-SUFFIX,userapi.com,DIRECT
